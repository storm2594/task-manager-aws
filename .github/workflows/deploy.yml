name: TaskFlow CI/CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Backend Docker Image
      run: |
        docker build -t backend ./backend
        docker tag backend:latest $ECR_BACKEND_REPO:latest

    - name: Push Backend Image
      run: docker push $ECR_BACKEND_REPO:latest

    - name: Build Frontend Docker Image
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest $ECR_FRONTEND_REPO:latest

    - name: Push Frontend Image
      run: docker push $ECR_FRONTEND_REPO:latest


  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_BACKEND_REPO }}

          docker pull ${{ secrets.ECR_BACKEND_REPO }}:latest
          docker pull ${{ secrets.ECR_FRONTEND_REPO }}:latest

          docker stop frontend backend || true
          docker rm frontend backend || true

          docker run -d \
          --name backend \
          --network taskmanager-net \
          -p 5000:5000 \
          -e DB_HOST=taskmanager-db.cil4wmgwqtrv.us-east-1.rds.amazonaws.com \
          -e DB_PORT=5432 \
          -e DB_USER=postgres \
          -e DB_PASSWORD=strongpassword \
          -e DB_NAME=taskmanager \
          -e JWT_SECRET=secret \
          ${{ secrets.ECR_BACKEND_REPO }}:latest

          docker run -d \
          --name frontend \
          --network taskmanager-net \
          -p 80:80 \
          ${{ secrets.ECR_FRONTEND_REPO }}:latest
